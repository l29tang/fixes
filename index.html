<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>TACTIC — A Platformer About Tourette Syndrome</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="game-container">
      <canvas id="game" width="1280" height="720"></canvas>

      <div id="hud">
        <div id="hud-left">
          <div id="level-label">Level 1</div>
        </div>
        <button id="restart-btn" title="Restart From Checkpoint">⟲</button>
      </div>

      <div id="overlay" class="hidden">
        <div id="overlay-box">
          <h1 id="overlay-title">TACTIC</h1>
          <p id="overlay-text"></p>
          <button id="overlay-btn" class="menu-btn">Start</button>
        </div>
      </div>

      <div id="controls-hint">
        ← → move &nbsp;|&nbsp; ↑ / Space jump &nbsp;|&nbsp; Esc menu
      </div>
    </div>

    <!-- <script src="js/levels.js"></script>
  <script src="js/game.js"></script> -->
    <script src="js/levels.js"></script>
    <script src="js/level-select.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
